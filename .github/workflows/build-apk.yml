name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Java环境
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: 设置Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 授予gradlew执行权限
      run: chmod +x gradlew
    
    - name: 构建Debug APK
      run: ./gradlew assembleDebug
    
    - name: 构建Release APK
      run: ./gradlew assembleRelease
      continue-on-error: true  # Release构建可能需要签名，但可选
    
    - name: 上传APK产物
      uses: actions/upload-artifact@v4
      with:
        name: mp3-player-apk
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        retention-days: 7
    
    - name: 创建GitHub Release（仅限标签）
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
    
    - name: 显示构建信息
      run: |
        echo "✅ 构建完成！"
        echo "📱 APK信息："
        echo "  调试版: app/build/outputs/apk/debug/app-debug.apk"
        echo "  发布版: app/build/outputs/apk/release/app-release.apk"
        echo "  目标SDK: 35 (Android 15+)"
        echo "  最小SDK: 24 (Android 7.0+)"
        echo ""
        echo "📦 产物可在Artifacts中下载"